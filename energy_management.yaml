# =============================================================================
# Energy Management Package – חבילת ניהול אנרגיה לפי תחזית
# =============================================================================
# מבנה: CONFIG | FORECAST | DECISIONS | ACTIONS
# =============================================================================

# =============================
# CONFIG – פרמטרים והגדרות
# =============================

input_boolean:
  energy_manual_override:
    name: "Energy Manual Override"
    icon: mdi:hand-back-right
    initial: false

input_number:
  battery_capacity:
    name: "Battery Capacity"
    min: 1
    max: 200
    step: 0.1
    unit_of_measurement: "kWh"
    initial: 20
  baseline_consumption_kw:
    name: "Baseline Consumption"
    min: 0
    max: 20
    step: 0.1
    unit_of_measurement: "kW"
    initial: 0.8
  eod_battery_target:
    name: "EOD Battery Target"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 90
  emergency_battery_reserve_percent:
    name: "Emergency Battery Reserve"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 20
  daily_forecast_safety_factor_percent:
    name: "Daily Forecast Safety Factor"
    min: 10
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 90
  consumer_delay_minutes:
    name: "Consumer Delay Minutes"
    min: 1
    max: 15
    step: 1
    initial: 5
    unit_of_measurement: "min"
    icon: mdi:timer-sand
    mode: slider
  max_battery_current_amps:
    name: "Max Battery Current"
    min: 1
    max: 100
    step: 1
    initial: 36
    unit_of_measurement: "A"
    icon: mdi:current-dc
  discharge_limit_percent:
    name: "Discharge Limit Percent"
    min: 1
    max: 100
    step: 1
    initial: 80
    unit_of_measurement: "%"
    icon: mdi:percent
  discharge_limit_deadband_percent:
    name: "Discharge Limit Deadband"
    min: 0
    max: 30
    step: 1
    initial: 5
    unit_of_measurement: "%"
    icon: mdi:delta
  discharge_limit_turned_off_count:
    name: "Discharge Limit Turned Off Count"
    min: 0
    max: 20
    step: 1
    initial: 0

input_select:
  battery_strategy_recommendation:
    name: "Battery Strategy Recommendation"
    options:
      - low
      - medium
      - high
      - full
    initial: full

input_text:
  battery_strategy_reason:
    name: "Battery Strategy Reason"
    max: 255
  energy_saver_last_change:
    name: "Energy Profile Last Change Reason"
    max: 255
    initial: "No changes yet"
    icon: mdi:text-box
  consumers_turned_on_by_wasting:
    name: "Heavy consumers turned on by Energy wasting"
    max: 255
    initial: ""

utility_meter:
  solarman_total_load_last_hour:
    source: sensor.solarman_total_load_consumption
    cycle: hourly
    name: "Total load consumption last hour"


# =============================
# FORECAST – תחזית והמלצה
# =============================

template:
  - sensor:
      - name: "PV Battery Status"
        unique_id: pv_battery_status
        icon: mdi:battery-charging
        state: >
          {% set soc = states('sensor.solarman_battery_soc') %}
          {% if soc in ['unknown','unavailable','none',''] %}
            medium
          {% else %}
            {% set soc_val = soc | float %}
            {% if soc_val < 15 %}
              very low
            {% elif soc_val < 30 %}
              low
            {% elif soc_val < 70 %}
              medium
            {% elif soc_val < 95 %}
              high
            {% else %}
              full
            {% endif %}
          {% endif %}

  - binary_sensor:
      # פריקה מתחת ל־(סף − deadband)% → אזור להדלקה מחדש (ייצוב)
      - name: "Discharge Under Limit"
        unique_id: discharge_under_limit
        state: >
          {% set c = states('sensor.solarman_battery_current') %}
          {% set m = states('input_number.max_battery_current_amps') | float(36) %}
          {% set pct = states('input_number.discharge_limit_percent') | float(80) %}
          {% set db = states('input_number.discharge_limit_deadband_percent') | float(5) %}
          {% set thr = m * (pct - db) / 100 %}
          {% if c in ['unknown','unavailable','none',''] %}
            false
          {% else %}
            {% set c = c | float %}
            {{ c > 0 and c < thr }}
          {% endif %}

      # מותר להדליק צרכן כבד: מרווח יומי חיובי + סוללה+PV לשעה הבאה מספיקים מול צריכה משוערת
      - name: "Can turn on heavy consumer"
        unique_id: can_turn_on_heavy_consumer
        state: >
          {% set dm = states('sensor.daily_margin') | float(0) %}
          {% set soc = states('sensor.solarman_battery_soc') | float(0) %}
          {% set cap = states('input_number.battery_capacity') | float(20) %}
          {% set pv = states('sensor.energy_next_hour') | float(0) %}
          {% set cons = (states('sensor.solarman_total_load_power') | float(0)) / 1000 %}
          {{ dm > 0 and (soc/100 * cap + pv - cons) > 0 }}
      # סוללה מעל רמה מומלצת (לא שווה) → מותר להדליק צרכנים. ירדנו מההמלצה → מכבים.
      # full=רק full, high=high+, medium=medium+, low=low+
      - name: "Can Waste Energy"
        unique_id: can_waste_energy
        state: >
          {% set battery = states('sensor.pv_battery_status') %}
          {% set rec = states('input_select.battery_strategy_recommendation') %}
          {% set levels = {
            'very low': 0, 'low': 1, 'medium': 2, 'high': 3, 'full': 4
          } %}
          {% set min_level = {
            'low': 1, 'medium': 2, 'high': 3, 'full': 4
          } %}
          {% set cur = levels.get(battery, 0) %}
          {% set req = min_level.get(rec, 4) %}
          {{ cur > req }}

  - sensor:
      - name: "high load consumers"
        unique_id: high_load_consumers_sensor
        state: >
          {% set members = state_attr('switch.tsrknym_kbdym_dypvt_nmvkh', 'entity_id') | default([]) %}
          {% set total = members | count %}
          {% set on_count = members | select('is_state', 'on') | list | count %}
          {{ on_count }}/{{ total }}
        attributes:
          percentage: >
            {% set members = state_attr('switch.tsrknym_kbdym_dypvt_nmvkh', 'entity_id') | default([]) %}
            {% set total = members | count %}
            {% set on_count = members | select('is_state', 'on') | list | count %}
            {% if total > 0 %}{{ (on_count / total * 100) | round(0) }}{% else %}0{% endif %}

      - name: "Solar Battery Charge State"
        unique_id: solar_battery_charge_state
        state: >
          {% set c = states('sensor.solarman_battery_current') %}
          {% set m = states('input_number.max_battery_current_amps') | float(36) %}
          {% if c in ['unknown','unavailable','none',''] %}
            off
          {% else %}
            {% set c = c | float %}
            {% if c <= -m %}max{% elif c < 0 %}on{% else %}off{% endif %}
          {% endif %}

      - name: "Solar Battery Discharge State"
        unique_id: solar_battery_discharge_state
        state: >
          {% set c = states('sensor.solarman_battery_current') %}
          {% set m = states('input_number.max_battery_current_amps') | float(36) %}
          {% set pct = states('input_number.discharge_limit_percent') | float(80) %}
          {% set thr = m * pct / 100 %}
          {% if c in ['unknown','unavailable','none',''] %}
            off
          {% else %}
            {% set c = c | float %}
            {% if c <= 0 %}off{% elif c >= thr %}max{% else %}on{% endif %}
          {% endif %}

      - name: "Hours Until EOD"
        unique_id: energy_hours_until_eod
        unit_of_measurement: "h"
        state: >
          {% set ns = state_attr('sun.sun', 'next_setting') %}
          {% if ns %}{{ ((as_timestamp(ns) - now().timestamp()) / 3600) | round(2) }}{% else %}0{% endif %}

      - name: "Energy Consumption Till EOD"
        unique_id: energy_consumption_till_eod
        unit_of_measurement: "kWh"
        state: >
          {% set base = states('input_number.baseline_consumption_kw') | float(0.6) %}
          {% set h = states('sensor.hours_until_eod') | float(0) %}
          {{ (base * h) | round(2) }}

      - name: "Battery Charge Headroom"
        unique_id: battery_charge_headroom
        unit_of_measurement: "kWh"
        state: >
          {% set soc = states('sensor.solarman_battery_soc') | float(0) %}
          {% set cap = states('input_number.battery_capacity') | float(20) %}
          {% set target = states('input_number.eod_battery_target') | float(90) %}
          {% set diff = target - soc %}
          {% if diff > 0 %}{{ (diff / 100 * cap) | round(2) }}{% else %}0{% endif %}

      - name: "Emergency Reserve Energy"
        unique_id: emergency_reserve_energy
        unit_of_measurement: "kWh"
        state: >
          {% set cap = states('input_number.battery_capacity') | float(20) %}
          {% set p = states('input_number.emergency_battery_reserve_percent') | float(20) %}
          {{ (cap * p / 100) | round(2) }}

      - name: "Needed Energy Today"
        unique_id: needed_energy_today
        unit_of_measurement: "kWh"
        state: >
          {{ (
            states('sensor.energy_consumption_till_eod') | float(0)
            + states('sensor.battery_charge_headroom') | float(0)
            + states('sensor.emergency_reserve_energy') | float(0)
          ) | round(2) }}

      - name: "PV Remaining Today Safe"
        unique_id: pv_remaining_today_safe
        unit_of_measurement: "kWh"
        state: >
          {% set pv = states('sensor.energy_production_today_remaining') | float(0) %}
          {% set sf = states('input_number.daily_forecast_safety_factor_percent') | float(90) %}
          {{ (pv * sf / 100) | round(2) }}

      - name: "Daily Margin"
        unique_id: energy_daily_margin
        unit_of_measurement: "kWh"
        state: >
          {{ (
            states('sensor.pv_remaining_today_safe') | float(0)
            - states('sensor.needed_energy_today') | float(0)
          ) | round(2) }}

script:
  recommend_battery_strategy_v5:
    alias: "Recommend Battery Strategy (v5)"
    sequence:
      - variables:
          daily_margin: "{{ states('sensor.daily_margin') | float(0) }}"
          consumption_next_hour: "{{ (states('sensor.solarman_total_load_power') | float(0)) / 1000 }}"
          pv_next_hour: "{{ states('sensor.energy_next_hour') | float(0) }}"
      - choose:
          # 1. EOD לא ניתן להשגה → FULL (עצירה קשיחה)
          - conditions:
              - condition: template
                value_template: "{{ daily_margin < 0 }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.battery_strategy_recommendation
                data:
                  option: full
              - service: input_text.set_value
                target:
                  entity_id: input_text.battery_strategy_reason
                data:
                  value: "FULL – EOD target not reachable (daily_margin={{ daily_margin }} kWh)"
              - stop: "EOD failure"
          # 2. אין PV לשעה הבאה (לפי צריכה שעה אחרונה) → FULL (עצירה קשיחה)
          - conditions:
              - condition: template
                value_template: "{{ pv_next_hour < consumption_next_hour }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.battery_strategy_recommendation
                data:
                  option: full
              - service: input_text.set_value
                target:
                  entity_id: input_text.battery_strategy_reason
                data:
                  value: "FULL – no PV for next hour (need {{ consumption_next_hour }} kWh)"
              - stop: "Next hour fail"
          # 3. daily margin קטן (≤20 kWh) → HIGH
          - conditions:
              - condition: template
                value_template: "{{ daily_margin <= 20 }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.battery_strategy_recommendation
                data:
                  option: high
              - service: input_text.set_value
                target:
                  entity_id: input_text.battery_strategy_reason
                data:
                  value: "HIGH – small daily buffer ({{ daily_margin }} kWh)"
          # 4. daily margin בינוני (20-40 kWh) → MEDIUM
          - conditions:
              - condition: template
                value_template: "{{ daily_margin > 20 and daily_margin <= 40 }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.battery_strategy_recommendation
                data:
                  option: medium
              - service: input_text.set_value
                target:
                  entity_id: input_text.battery_strategy_reason
                data:
                  value: "MEDIUM – medium daily buffer ({{ daily_margin }} kWh)"
        # default: daily margin גדול (>40 kWh) → LOW
        default:
          - service: input_select.select_option
            target:
              entity_id: input_select.battery_strategy_recommendation
            data:
              option: low
          - service: input_text.set_value
            target:
              entity_id: input_text.battery_strategy_reason
            data:
              value: "LOW – large daily buffer ({{ daily_margin }} kWh)"

  discharge_over_limit_turn_off_one:
    alias: "פריקה מעל סף – כבה צרכן אחד (סדר הפוך)"
    description: "כש־Solar Battery Discharge State = max, כבה את הצרכן הראשון שדלוק (מהסוף של הרשימה)"
    sequence:
      - variables:
          rev: "{{ expand('switch.tsrknym_kbdym_dypvt_nmvkh') | map(attribute='entity_id') | reverse | list }}"
      - repeat:
          for_each: "{{ rev }}"
          sequence:
            - condition: template
              value_template: "{{ is_state(repeat.item, 'on') }}"
            - service: switch.turn_off
              target:
                entity_id: "{{ repeat.item }}"
            - stop: "כיבוי אחד"

# =============================
# DECISIONS – החלטות (עדכון energy_saver)
# =============================
# =============================
# ACTIONS – פעולות (הפעלה/כיבוי לפי energy_saver)
# =============================

automation:
  # אוטומציות ניהול אנרגיה
  - alias: "[חבילת אנרגיה] תחזית – עדכון המלצת אסטרטגיה"
    description: "תחזית – עדכון המלצת אסטרטגיה (קובץ חיצוני)"
    trigger:
      - platform: state
        entity_id: sensor.pv_battery_status
        id: battery_status_change
      - platform: time_pattern
        minutes: "/30"
      - platform: homeassistant
        event: start
    action:
      - service: script.recommend_battery_strategy_v5

  # החלטות: סדר עדיפויות – מצבים קריטיים → תחזית → מצבים רגילים
  - alias: "[חבילת אנרגיה] החלטות – בחירת מצב (Off/Saving/Wasting)"
    description: "עדכון energy_saver לפי מצב נוכחי ותחזית (קובץ חיצוני)"
    trigger:
      - platform: state
        entity_id:
          - sensor.pv_battery_status
          - input_select.battery_strategy_recommendation
          - binary_sensor.can_waste_energy
          - sensor.solar_battery_charge_state
      - platform: state
        entity_id: input_boolean.energy_manual_override
        id: manual_override_change
      - platform: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.energy_manual_override
        state: "off"
    action:
      - choose:
          # 1. עדיפות עליונה: טעינה מקסימלית (עודף אנרגיה) → מדליקים צרכנים
          - conditions:
              - condition: state
                entity_id: sensor.solar_battery_charge_state
                state: max
                for:
                  minutes: 5
            alias: "טעינה מקסימלית – עודף אנרגיה"
            sequence:
              - if:
                - condition: template
                  value_template: "{{ current_mode != 'Energy wasting' }}"
                then:
                  - service: input_select.select_option
                    target:
                      entity_id: input_select.energy_saver
                    data:
                      option: Energy wasting
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.energy_saver_last_change
                    data:
                      value: "טעינה מקסימלית (עודף) – הדלקת צרכנים {{ now().strftime('%H:%M') }}"
                  - if:
                    - condition: template
                      value_template: "{{ battery_status == 'very low' and current_mode != 'Energy wasting' }}"
                    then:
                      - service: notify.telegram
                        data:
                          message: "טעינה מקסימלית + סוללה נמוכה מאוד – שימוש בעודף אנרגיה"

          # 2. קריטי: סוללה נמוכה מאוד + לא בטעינה מקסימלית → חיסכון מקסימלי
          - conditions:
              - condition: template
                value_template: "{{ battery_status == 'very low' }}"
              - condition: template
                value_template: "{{ charging_state != 'max' }}"
            alias: "סוללה נמוכה מאוד – חיסכון מקסימלי"
            sequence:
              - if:
                - condition: template
                  value_template: "{{ current_mode != 'Super energy saving' }}"
                then:
                  - service: input_select.select_option
                    target:
                      entity_id: input_select.energy_saver
                    data:
                      option: Super energy saving
                  - service: input_number.set_value
                    target:
                      entity_id: input_number.discharge_limit_turned_off_count
                    data:
                      value: 0
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.energy_saver_last_change
                    data:
                      value: "סוללה נמוכה מאוד – חיסכון מקסימלי {{ now().strftime('%H:%M') }}"
                  - if:
                    - condition: template
                      value_template: "{{ current_mode != 'Energy wasting' }}"
                    then:
                      - service: notify.telegram
                        data:
                          message: "סוללה נמוכה מאוד – חיסכון מקסימלי מופעל"

          # 4. תחזית: סוללה >= רמה מומלצת → מדליקים צרכנים
          - conditions:
              - condition: state
                entity_id: binary_sensor.can_waste_energy
                state: "on"
            alias: "תחזית – סוללה מעל רמה מומלצת"
            sequence:
              - if:
                - condition: template
                  value_template: "{{ current_mode != 'Energy wasting' }}"
                then:
                  - service: input_select.select_option
                    target:
                      entity_id: input_select.energy_saver
                    data:
                      option: Energy wasting
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.energy_saver_last_change
                    data:
                      value: "תחזית: סוללה {{ battery_status }} >= {{ rec }} – הדלקת צרכנים {{ now().strftime('%H:%M') }}"

          # 3. סוללה נמוכה + לא בטעינה מקסימלית → חיסכון (עם שאלה למשתמש)
          - conditions:
              - condition: template
                value_template: "{{ battery_status == 'low' }}"
              - condition: template
                value_template: "{{ charging_state != 'max' }}"
            alias: "סוללה נמוכה – חיסכון (עם אישור משתמש)"
            sequence:
              - service: script.telegram_gate
                data:
                  continue_on_timeout: true
                  timeout: "00:10:00"
                  message: "סוללה מערכת סולארית נמוכה, להפעיל מצב חיסכון באנרגיה?"
              - if:
                - condition: state
                  entity_id: input_select.telegram_gate_status
                  state: cancel
                then:
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.energy_saver_last_change
                    data:
                      value: "משתמש ביטל חיסכון אנרגיה {{ now().strftime('%H:%M') }}"
                  - stop: "משתמש ביטל"
              - service: input_select.select_option
                target:
                  entity_id: input_select.energy_saver
                data:
                  option: Energy saving
              - service: input_number.set_value
                target:
                  entity_id: input_number.discharge_limit_turned_off_count
                data:
                  value: 0
              - service: input_text.set_value
                target:
                  entity_id: input_text.energy_saver_last_change
                data:
                  value: "סוללה נמוכה (אושר) – חיסכון אנרגיה {{ now().strftime('%H:%M') }}"

          # 5. סוללה בדיוק ברמת ההמלצה (לא מעל) → מצב נורמלי (Off) – צרכנים ידניים נשארים
          - conditions:
              - condition: template
                value_template: >
                  {{ {'very low':0,'low':1,'medium':2,'high':3,'full':4}.get(battery_status,0)
                     == {'low':1,'medium':2,'high':3,'full':4}.get(rec,4) }}
            alias: "סוללה ברמת ההמלצה – Off"
            sequence:
              - if:
                - condition: template
                  value_template: "{{ current_mode != 'Off' }}"
                then:
                  - service: input_select.select_option
                    target:
                      entity_id: input_select.energy_saver
                    data:
                      option: "Off"
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.energy_saver_last_change
                    data:
                      value: "סוללה ברמת ההמלצה – Off {{ now().strftime('%H:%M') }}"

        # default: תחזית – סוללה מתחת לרמה מומלצת → חיסכון
        default:
          alias: "תחזית – סוללה מתחת לרמה מומלצת"
          sequence:
            - if:
              - condition: template
                value_template: "{{ current_mode != 'Energy saving' }}"
              then:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.energy_saver
                  data:
                    option: Energy saving
                - service: input_number.set_value
                  target:
                    entity_id: input_number.discharge_limit_turned_off_count
                  data:
                    value: 0
                - service: input_text.set_value
                  target:
                    entity_id: input_text.energy_saver_last_change
                  data:
                    value: "תחזית: סוללה {{ battery_status }} < {{ rec }} – כיבוי צרכנים {{ now().strftime('%H:%M') }}"
    mode: restart
    variables:
      battery_status: "{{ states('sensor.pv_battery_status') }}"
      charging_state: "{{ states('sensor.solar_battery_charge_state') }}"
      current_mode: "{{ states('input_select.energy_saver') }}"
      rec: "{{ states('input_select.battery_strategy_recommendation') }}"

  - alias: "[חבילת אנרגיה] פעולות – הפעלה/כיבוי צרכנים לפי מצב"
    description: "הפעלה/כיבוי צרכנים לפי energy_saver (קובץ חיצוני)"
    trigger:
      - platform: state
        entity_id: input_select.energy_saver
        for:
          hours: 0
          minutes: 0
          seconds: 0
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ energy_mode == 'Energy wasting' }}"
            alias: "הדלקת צרכנים – Energy wasting"
            sequence:
              - repeat:
                  for_each: "{{ heavy_consumers }}"
                  sequence:
                    - condition: state
                      entity_id: input_select.energy_saver
                      state: "Energy wasting"
                    - condition: template
                      value_template: "{{ is_state(repeat.item, 'off') }}"
                    - condition: state
                      entity_id: binary_sensor.can_turn_on_heavy_consumer
                      state: "on"
                    - delay:
                        minutes: "{{ delay_minutes }}"
                    - condition: state
                      entity_id: input_select.energy_saver
                      state: "Energy wasting"
                    - condition: state
                      entity_id: binary_sensor.can_turn_on_heavy_consumer
                      state: "on"
                    - service: switch.turn_on
                      target:
                        entity_id: "{{ repeat.item }}"
                    - service: input_text.set_value
                      target:
                        entity_id: input_text.consumers_turned_on_by_wasting
                      data:
                        value: "{{ (states('input_text.consumers_turned_on_by_wasting') or '') + (',' if states('input_text.consumers_turned_on_by_wasting') else '') + repeat.item }}"
          - conditions:
              - condition: template
                value_template: "{{ energy_mode == 'Off' }}"
            alias: "כיבוי רק צרכנים שהודלקו ב־Wasting – מצב Off"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ (states('input_text.consumers_turned_on_by_wasting') or '') | trim != '' }}"
                then:
                  - service: switch.turn_off
                    target:
                      entity_id: "{{ (states('input_text.consumers_turned_on_by_wasting') or '') | trim(',') }}"
              - service: input_text.set_value
                target:
                  entity_id: input_text.consumers_turned_on_by_wasting
                data:
                  value: ""
          - conditions:
              - condition: template
                value_template: "{{ energy_mode == 'Energy saving' }}"
            alias: "כיבוי כל הצרכנים הכבדים מיד – Energy saving"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.tsrknym_kbdym_dypvt_nmvkh
              - service: input_text.set_value
                target:
                  entity_id: input_text.consumers_turned_on_by_wasting
                data:
                  value: ""
          - conditions:
              - condition: template
                value_template: "{{ energy_mode == 'Super energy saving' }}"
            alias: "כיבוי צרכנים ותאורה – Super energy saving"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.tsrknym_kbdym_dypvt_nmvkh
              - service: light.turn_off
                target:
                  entity_id: light.tvrh_dypvt_nmvkh
              - service: input_text.set_value
                target:
                  entity_id: input_text.consumers_turned_on_by_wasting
                data:
                  value: ""
          - conditions:
              - condition: template
                value_template: "{{ energy_mode == 'Max energy wasting' }}"
            alias: "Max energy wasting (שמורה לעתיד)"
            sequence:
              - service: notify.telegram
                data:
                  message: "⚡ Max Energy Wasting mode activated (reserved for future)"
    mode: restart
    variables:
      heavy_consumers: "{{ expand('switch.tsrknym_kbdym_dypvt_nmvkh') | map(attribute='entity_id') | list }}"
      heavy_consumers_reverse: "{{ expand('switch.tsrknym_kbdym_dypvt_nmvkh') | map(attribute='entity_id') | reverse | list }}"
      delay_minutes: "{{ states('input_number.consumer_delay_minutes') | int }}"
      energy_mode: "{{ states('input_select.energy_saver') }}"

  - alias: "[חבילת אנרגיה] פריקה מעל סף – כבה צרכן אחד"
    description: "כשהפריקה מגיעה ל־max – כבה צרכן אחד (קובץ חיצוני)"
    trigger:
      - platform: state
        entity_id: sensor.solar_battery_discharge_state
        to: "max"
    condition:
      - condition: state
        entity_id: input_boolean.energy_manual_override
        state: "off"
      - condition: template
        value_template: "{{ states('input_select.energy_saver') in ['Energy wasting', 'Off'] }}"
    action:
      - service: script.discharge_over_limit_turn_off_one
